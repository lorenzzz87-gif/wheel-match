<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>轮毂消消乐</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(180,20,20,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(80,80,120,0.1) 0%, transparent 60%);
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 480px;
    }

    .logo-wrap {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid rgba(200,50,50,0.6);
      box-shadow: 0 0 10px rgba(200,50,50,0.35);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    header .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #e0e0e0, #ffffff, #c0c0c0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stats {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 14px;
    }

    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      margin-top: 2px;
      color: #fff;
    }

    #score-display { color: #f0d060; }
    #level-display { color: #e05050; }

    /* Timer card */
    #timer-card {
      position: relative;
      overflow: hidden;
    }

    #timer-display {
      font-size: 22px;
      font-weight: 700;
      color: #60c0f0;
      transition: color 0.3s;
    }

    #timer-display.warning { color: #f06030; }
    #timer-display.danger  { color: #e02020; animation: pulse 0.5s infinite alternate; }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.12); }
    }

    #timer-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, #60c0f0, #3080e0);
      transition: width 1s linear, background 0.3s;
      border-radius: 0 0 12px 12px;
    }

    #timer-bar.warning { background: linear-gradient(90deg, #f06030, #e03010); }

    /* Time bonus popup */
    .time-popup {
      position: fixed;
      top: 120px;
      right: 20px;
      font-size: 16px;
      font-weight: 800;
      color: #60e0a0;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 100;
      animation: floatUp 1s ease forwards;
    }

    /* Board */
    #board-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
      padding: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      width: 100%;
      position: relative;
    }

    .tile {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      cursor: pointer;
      overflow: visible;
      background: rgba(40,40,60,0.8);
      border: 2px solid transparent;
      user-select: none;
      /* swap animation handled via JS inline style */
      will-change: transform;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      padding: 4px;
      border-radius: 8px;
    }

    .tile:hover:not(.no-hover) { transform: scale(1.06); }

    .tile.selected {
      border-color: #f0d060;
      box-shadow: 0 0 0 2px #f0d060, 0 0 16px rgba(240,208,96,0.5);
      transform: scale(1.1);
      z-index: 10;
    }

    .tile.logo-tile::after {
      content: '★';
      position: absolute;
      top: 2px;
      right: 3px;
      font-size: 9px;
      color: #e05050;
      line-height: 1;
      z-index: 2;
    }

    .tile.matched {
      animation: pop 0.32s ease forwards;
      pointer-events: none;
    }

    @keyframes pop {
      0%   { transform: scale(1); opacity: 1; }
      40%  { transform: scale(1.3); opacity: 0.7; }
      100% { transform: scale(0); opacity: 0; }
    }

    .tile.falling {
      animation: fall 0.22s ease-out forwards;
    }

    @keyframes fall {
      0%   { transform: translateY(-36px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .tile.shake {
      animation: shake 0.28s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }

    /* Distinct colored backgrounds */
    .tile[data-type="1"]  { background: rgba(220,60,60,0.25);   border-color: rgba(220,60,60,0.5); }
    .tile[data-type="2"]  { background: rgba(60,120,220,0.25);  border-color: rgba(60,120,220,0.5); }
    .tile[data-type="3"]  { background: rgba(60,200,100,0.25);  border-color: rgba(60,200,100,0.5); }
    .tile[data-type="4"]  { background: rgba(220,160,40,0.25);  border-color: rgba(220,160,40,0.5); }
    .tile[data-type="5"]  { background: rgba(160,60,220,0.25);  border-color: rgba(160,60,220,0.5); }
    .tile[data-type="6"]  { background: rgba(40,200,220,0.25);  border-color: rgba(40,200,220,0.5); }
    .tile[data-type="7"]  { background: rgba(220,100,160,0.25); border-color: rgba(220,100,160,0.5); }
    .tile[data-type="8"]  { background: rgba(140,200,40,0.25);  border-color: rgba(140,200,40,0.5); }
    .tile[data-type="9"]  { background: rgba(220,120,40,0.25);  border-color: rgba(220,120,40,0.5); }
    .tile[data-type="0"]  { background: rgba(180,20,20,0.20);   border-color: rgba(200,50,50,0.6); }

    /* Score popup */
    .score-popup {
      position: fixed;
      font-size: 18px;
      font-weight: 800;
      color: #f0d060;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 100;
      animation: floatUp 0.9s ease forwards;
    }

    .score-popup.double { color: #e05050; font-size: 22px; }

    @keyframes floatUp {
      0%   { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-60px); opacity: 0; }
    }

    /* Overlay */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    #overlay.active { display: flex; }

    .modal {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 36px 40px;
      text-align: center;
      max-width: 320px;
      width: 90%;
    }

    .modal h2 {
      font-size: 26px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f0d060, #e08030);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal p { color: #aaa; margin-bottom: 6px; font-size: 14px; }
    .modal .final-score { font-size: 40px; font-weight: 800; color: #f0d060; margin: 12px 0; }

    .modal .detail {
      font-size: 13px;
      color: #888;
      margin: 4px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #c03030, #801010);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s;
    }

    .btn:hover { transform: scale(1.04); }

    /* Combo banner */
    .combo-banner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 150;
      font-size: 32px;
      font-weight: 900;
      color: #f0d060;
      text-shadow: 0 0 20px rgba(240,200,60,0.8), 0 4px 12px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    .combo-banner.show {
      animation: comboPop 0.8s ease forwards;
    }

    @keyframes comboPop {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      30%  { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      70%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
    }

    .level-hint {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
      text-align: center;
      width: 100%;
      max-width: 480px;
    }

    .level-hint span { color: #60e0a0; }

    /* Goal progress bar */
    .goal-bar-wrap {
      width: 100%;
      max-width: 480px;
      margin-bottom: 12px;
    }

    .goal-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .goal-bar-labels span { color: #f0d060; font-weight: 600; }

    .goal-bar-bg {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }

    #goal-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f0d060, #e08030);
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* Modal win vs fail */
    .modal.win-modal { border-color: rgba(240,208,60,0.4); }
    .modal.fail-modal { border-color: rgba(200,50,50,0.4); }

    .modal h2.win  { background: linear-gradient(135deg, #f0d060, #60e060); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .modal h2.fail { background: linear-gradient(135deg, #e05050, #c03030); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .btn.retry-btn { background: linear-gradient(135deg, #505080, #303060); }
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img src="assets/logo.jpg" alt="Logo" onerror="this.parentElement.style.display='none'">
  </div>
  <div class="brand">轮毂消消乐</div>
</header>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">分数</div>
    <div class="stat-value" id="score-display">0</div>
  </div>
  <div class="stat-card" id="timer-card">
    <div class="stat-label">倒计时</div>
    <div class="stat-value" id="timer-display">30</div>
    <div id="timer-bar" style="width:100%"></div>
  </div>
  <div class="stat-card">
    <div class="stat-label">关卡</div>
    <div class="stat-value" id="level-display">1</div>
  </div>
</div>

<div class="level-hint">三消 <span>+3秒</span> · Logo三消 <span>+4秒</span></div>

<div class="goal-bar-wrap">
  <div class="goal-bar-labels">
    <span id="goal-label">目标：0 分</span>
    <span id="score-label">0 / 0</span>
  </div>
  <div class="goal-bar-bg">
    <div id="goal-bar-fill"></div>
  </div>
</div>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div class="combo-banner" id="combo-banner"></div>

<div id="overlay">
  <div class="modal" id="modal">
    <h2 id="modal-title">恭喜过关！</h2>
    <p id="modal-sub">本关得分</p>
    <div class="final-score" id="modal-score">0</div>
    <div class="detail" id="modal-detail"></div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="btn retry-btn" id="retry-btn" onclick="retryLevel()" style="display:none">再试一次</button>
      <button class="btn" id="next-btn" onclick="nextLevel()">下一关 →</button>
    </div>
  </div>
</div>

<script>
const COLS = 8;
const ROWS = 8;
const PRODUCT_TYPES = 9;
const LOGO_TYPE = 0;
const BASE_TIME = 30;
const TIME_BONUS_NORMAL = 3;
const TIME_BONUS_LOGO   = 4;

// 每关目标分数
const LEVEL_GOALS = [500, 1000, 1800, 2800, 4000, 5500, 7500, 10000];
function levelGoal() { return LEVEL_GOALS[Math.min(level, LEVEL_GOALS.length - 1)]; }

let board = [];
let score = 0;
let level = 0;
let timeLeft = BASE_TIME;
let timerInterval = null;
let selected = null;
let busy = false;
let comboCount = 0;
let gameOver = false;

// Logo chance decreases each level: level0=8%, level1≈6.3%, level2≈4.7%, ...
function logoChance() {
  return Math.max(0.01, 0.08 - level * 0.015);
}

function tileImg(type) {
  if (type === LOGO_TYPE) return 'assets/logo.jpg';
  return `assets/wheel${type}.jpg`;
}

// ── Board init (guaranteed no starting matches) ───────────────
function randomProductType() {
  return Math.ceil(Math.random() * PRODUCT_TYPES);
}

function randomType() {
  return Math.random() < logoChance() ? LOGO_TYPE : randomProductType();
}

// True if three values form a match (wild = logo)
function isMatch3(a, b, c) {
  // Resolve wilds: find the "real" type
  const types = [a, b, c].filter(t => t !== LOGO_TYPE);
  if (types.length === 0) return true; // all logos
  const base = types[0];
  return types.every(t => t === base);
}

function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      let t;
      let tries = 0;
      do {
        t = randomType();
        tries++;
        // avoid creating horizontal match
        const hMatch = c >= 2 && isMatch3(board[r][c-2], board[r][c-1], t);
        // avoid creating vertical match
        const vMatch = r >= 2 && isMatch3(board[r-2][c], board[r-1][c], t);
        if (!hMatch && !vMatch) break;
      } while (tries < 50);
      board[r][c] = t;
    }
  }
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = board[r][c];
      const tile = document.createElement('div');
      tile.className = 'tile' + (t === LOGO_TYPE ? ' logo-tile' : '');
      tile.dataset.r = r;
      tile.dataset.c = c;
      tile.dataset.type = t;

      const img = document.createElement('img');
      img.src = tileImg(t);
      img.draggable = false;
      img.alt = t === LOGO_TYPE ? 'LOGO' : `轮毂${t}`;

      tile.appendChild(img);
      tile.addEventListener('click', () => onTileClick(r, c));
      boardEl.appendChild(tile);
    }
  }
  updateStats();
}

function getTileEl(r, c) {
  return document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
}

// ── Timer ─────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  gameOver = false;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    if (busy) return; // pause tick while animating
    timeLeft = Math.max(0, timeLeft - 1);
    updateTimerDisplay();
    if (timeLeft === 0) {
      clearInterval(timerInterval);
      gameOver = true;
      setTimeout(() => showModal(score >= levelGoal() ? 'win' : 'fail'), 300);
    }
  }, 1000);
}

function addTime(seconds) {
  timeLeft += seconds;
  updateTimerDisplay();
  // Show "+Xs" popup near timer
  const popup = document.createElement('div');
  popup.className = 'time-popup';
  popup.textContent = `+${seconds}秒`;
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1050);
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  const bar = document.getElementById('timer-bar');
  el.textContent = timeLeft;
  el.className = 'stat-value';
  bar.className = '';

  const pct = Math.min(1, timeLeft / BASE_TIME) * 100;
  bar.style.width = pct + '%';

  if (timeLeft <= 5) {
    el.classList.add('danger');
    bar.classList.add('warning');
  } else if (timeLeft <= 10) {
    el.classList.add('warning');
    bar.classList.add('warning');
  }
}

// ── Selection & swap ─────────────────────────────────────────
function onTileClick(r, c) {
  resumeAudio();
  if (busy || gameOver) return;
  if (selected === null) {
    selected = { r, c };
    getTileEl(r, c).classList.add('selected');
  } else {
    const sr = selected.r, sc = selected.c;
    getTileEl(sr, sc).classList.remove('selected');

    if (sr === r && sc === c) { selected = null; return; }

    const adjacent = (Math.abs(sr - r) + Math.abs(sc - c)) === 1;
    selected = null;

    if (adjacent) {
      attemptSwap(sr, sc, r, c);
    } else {
      selected = { r, c };
      getTileEl(r, c).classList.add('selected');
    }
  }
}

async function attemptSwap(r1, c1, r2, c2) {
  busy = true;

  // Animate swap
  await animateSwap(r1, c1, r2, c2);

  // Do data swap
  swap(r1, c1, r2, c2);
  render();

  const matches = findMatches();
  if (matches.length > 0) {
    comboCount = 0;
    await resolveMatches(matches);
  } else {
    // Invalid — animate back
    await animateSwap(r1, c1, r2, c2);
    swap(r1, c1, r2, c2);
    render();
    getTileEl(r1, c1).classList.add('shake');
    getTileEl(r2, c2).classList.add('shake');
    await delay(300);
  }
  busy = false;
}

async function animateSwap(r1, c1, r2, c2) {
  const el1 = getTileEl(r1, c1);
  const el2 = getTileEl(r2, c2);
  if (!el1 || !el2) return;

  const rect1 = el1.getBoundingClientRect();
  const rect2 = el2.getBoundingClientRect();
  const dx = rect2.left - rect1.left;
  const dy = rect2.top  - rect1.top;

  el1.classList.add('no-hover');
  el2.classList.add('no-hover');
  el1.style.transition = 'transform 0.18s ease';
  el2.style.transition = 'transform 0.18s ease';
  el1.style.zIndex = '5';
  el2.style.zIndex = '5';
  el1.style.transform = `translate(${dx}px, ${dy}px)`;
  el2.style.transform = `translate(${-dx}px, ${-dy}px)`;

  await delay(200);

  el1.style.transition = '';
  el1.style.transform  = '';
  el1.style.zIndex     = '';
  el2.style.transition = '';
  el2.style.transform  = '';
  el2.style.zIndex     = '';
}

function swap(r1, c1, r2, c2) {
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
}

// ── Match detection ──────────────────────────────────────────
function findMatches() {
  const matched = new Set();

  // Horizontal runs
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      // Find the base type (skip logo at start of run)
      let base = board[r][c];
      let end = c + 1;
      while (end < COLS) {
        const t = board[r][end];
        if (base === LOGO_TYPE) {
          base = t; // resolve wild
          end++;
        } else if (t === LOGO_TYPE || t === base) {
          end++;
        } else {
          break;
        }
      }
      if (end - c >= 3) {
        for (let i = c; i < end; i++) matched.add(`${r},${i}`);
      }
      c = end;
    }
  }

  // Vertical runs
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      let base = board[r][c];
      let end = r + 1;
      while (end < ROWS) {
        const t = board[end][c];
        if (base === LOGO_TYPE) {
          base = t;
          end++;
        } else if (t === LOGO_TYPE || t === base) {
          end++;
        } else {
          break;
        }
      }
      if (end - r >= 3) {
        for (let i = r; i < end; i++) matched.add(`${i},${c}`);
      }
      r = end;
    }
  }

  return [...matched].map(k => {
    const [r, c] = k.split(',').map(Number);
    return { r, c };
  });
}

// ── Update a single tile element in place (no re-render) ─────
function updateTileEl(r, c) {
  const t = board[r][c];
  const el = getTileEl(r, c);
  if (!el) return;
  el.dataset.type = t;
  el.className = 'tile' + (t === LOGO_TYPE ? ' logo-tile' : '');
  const img = el.querySelector('img');
  if (img) {
    img.src = tileImg(t);
    img.alt = t === LOGO_TYPE ? 'LOGO' : `轮毂${t}`;
  }
}

// ── Resolve cascade ──────────────────────────────────────────
async function resolveMatches(matches) {
  comboCount++;
  const hasLogo = matches.some(({ r, c }) => board[r][c] === LOGO_TYPE);

  // 1. Pop matched tiles
  matches.forEach(({ r, c }) => getTileEl(r, c)?.classList.add('matched'));

  const pts = calcScore(matches, hasLogo);
  showScorePopup(pts, hasLogo, matches);
  if (comboCount >= 2) showComboBanner(comboCount);
  addTime(hasLogo ? TIME_BONUS_LOGO : TIME_BONUS_NORMAL);
  hasLogo ? playLogoSound() : playMatchSound();

  await delay(350);

  // 2. Mark nulls, compute per-column removal counts and fall distances
  const removedInCol = {};
  matches.forEach(({ r, c }) => {
    board[r][c] = null;
    removedInCol[c] = (removedInCol[c] || 0) + 1;
  });
  const affectedCols = Object.keys(removedInCol).map(Number);

  // For each non-null tile, count how many nulls are below it in same column → fall distance
  const fallMap = {}; // "r,c" -> rows to fall
  for (const c of affectedCols) {
    const nullRows = [];
    for (let r = 0; r < ROWS; r++) if (board[r][c] === null) nullRows.push(r);
    for (let r = 0; r < ROWS; r++) {
      if (board[r][c] !== null) {
        const dist = nullRows.filter(nr => nr > r).length;
        if (dist > 0) fallMap[`${r},${c}`] = dist;
      }
    }
  }

  // 3. Slide existing tiles down to their new positions
  const boardEl = document.getElementById('board');
  const cellH = boardEl.getBoundingClientRect().height / ROWS;
  const GAP = 4;

  for (const [key, dist] of Object.entries(fallMap)) {
    const [r, c] = key.split(',').map(Number);
    const el = getTileEl(r, c);
    if (!el) continue;
    el.style.transition = 'transform 0.22s ease-in';
    el.style.zIndex = '3';
    el.style.transform = `translateY(${dist * (cellH + GAP)}px)`;
  }

  await delay(240);

  // Reset slide transforms before DOM update
  for (const key of Object.keys(fallMap)) {
    const [r, c] = key.split(',').map(Number);
    const el = getTileEl(r, c);
    if (el) { el.style.transition = ''; el.style.transform = ''; el.style.zIndex = ''; }
  }

  // 4. Apply gravity on board data
  for (const c of affectedCols) {
    let empty = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c] !== null) {
        board[empty][c] = board[r][c];
        if (empty !== r) board[r][c] = null;
        empty--;
      }
    }
    for (let r = empty; r >= 0; r--) board[r][c] = randomType();
  }

  score += pts;

  // 5. Update DOM only in affected columns; animate only new tiles falling in from top
  for (const c of affectedCols) {
    for (let r = 0; r < ROWS; r++) updateTileEl(r, c);
    const nNew = removedInCol[c];
    for (let r = 0; r < nNew; r++) {
      const el = getTileEl(r, c);
      if (!el) continue;
      el.style.animationDelay = `${r * 30}ms`;
      el.classList.add('falling');
      el.addEventListener('animationend', () => {
        el.classList.remove('falling');
        el.style.animationDelay = '';
      }, { once: true });
    }
  }

  updateStats();
  await delay(300);

  // 提前达标 → 立即过关
  if (!gameOver && score >= levelGoal()) {
    clearInterval(timerInterval);
    gameOver = true;
    setTimeout(() => showModal('win'), 200);
    return;
  }

  // 6. Cascade
  const next = findMatches();
  if (next.length > 0) await resolveMatches(next);
}

function calcScore(matches, hasLogo) {
  const base = matches.length * 50;
  const comboMult = comboCount >= 2 ? 1 + (comboCount - 1) * 0.5 : 1;
  const logoMult = hasLogo ? 2 : 1;
  return Math.round(base * comboMult * logoMult);
}

// ── UI helpers ───────────────────────────────────────────────
function showScorePopup(pts, isDouble, matches) {
  const boardEl = document.getElementById('board');
  const rect = boardEl.getBoundingClientRect();
  const mid = matches[Math.floor(matches.length / 2)];
  const cellW = rect.width / COLS;
  const cellH = rect.height / ROWS;

  const popup = document.createElement('div');
  popup.className = 'score-popup' + (isDouble ? ' double' : '');
  popup.textContent = (isDouble ? '★ x2  +' : '+') + pts;
  popup.style.left = (rect.left + mid.c * cellW) + 'px';
  popup.style.top  = (rect.top  + mid.r * cellH + window.scrollY) + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 950);
}

function showComboBanner(n) {
  const el = document.getElementById('combo-banner');
  el.textContent = `COMBO x${n}! 🔥`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 900);
}

function updateStats() {
  const goal = levelGoal();
  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('level-display').textContent = level + 1;
  document.getElementById('goal-label').textContent = `目标：${goal.toLocaleString()} 分`;
  document.getElementById('score-label').textContent = `${score.toLocaleString()} / ${goal.toLocaleString()}`;
  const pct = Math.min(100, (score / goal) * 100);
  document.getElementById('goal-bar-fill').style.width = pct + '%';
}

function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ── Audio (Web Audio API, no files needed) ───────────────────
const _ac = new (window.AudioContext || window.webkitAudioContext)();

function playMatchSound() {
  // 清脆三连音：do-mi-sol
  const notes = [523, 659, 784];
  notes.forEach((freq, i) => {
    const osc = _ac.createOscillator();
    const gain = _ac.createGain();
    osc.connect(gain);
    gain.connect(_ac.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = _ac.currentTime + i * 0.1;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.start(t);
    osc.stop(t + 0.22);
  });
}

function playLogoSound() {
  // 华丽logo专属音：上升琶音 + 闪光尾音
  const notes = [523, 659, 784, 1047, 1319];
  notes.forEach((freq, i) => {
    const osc = _ac.createOscillator();
    const gain = _ac.createGain();
    osc.connect(gain);
    gain.connect(_ac.destination);
    osc.type = i < 4 ? 'triangle' : 'sine';
    osc.frequency.value = freq;
    const t = _ac.currentTime + i * 0.08;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.start(t);
    osc.stop(t + 0.35);
  });
  // 额外: 低频鼓击感
  const bOsc = _ac.createOscillator();
  const bGain = _ac.createGain();
  bOsc.connect(bGain);
  bGain.connect(_ac.destination);
  bOsc.type = 'sine';
  bOsc.frequency.setValueAtTime(180, _ac.currentTime);
  bOsc.frequency.exponentialRampToValueAtTime(60, _ac.currentTime + 0.15);
  bGain.gain.setValueAtTime(0.4, _ac.currentTime);
  bGain.gain.exponentialRampToValueAtTime(0.001, _ac.currentTime + 0.2);
  bOsc.start(_ac.currentTime);
  bOsc.stop(_ac.currentTime + 0.2);
}

// 解除浏览器自动播放限制（首次点击时激活）
function resumeAudio() { if (_ac.state === 'suspended') _ac.resume(); }

// ── Level flow ───────────────────────────────────────────────
function showModal(type) {
  clearInterval(timerInterval);
  const modal = document.getElementById('modal');
  const title = document.getElementById('modal-title');
  const sub   = document.getElementById('modal-sub');
  const detail = document.getElementById('modal-detail');
  const nextBtn  = document.getElementById('next-btn');
  const retryBtn = document.getElementById('retry-btn');

  document.getElementById('modal-score').textContent = score.toLocaleString();

  if (type === 'win') {
    modal.className = 'modal win-modal';
    title.className = 'win';
    title.textContent = '🎉 恭喜过关！';
    sub.textContent = '本关得分';
    detail.textContent = `第 ${level + 1} 关完成 · 目标 ${levelGoal().toLocaleString()} 分`;
    nextBtn.style.display = '';
    retryBtn.style.display = 'none';
  } else {
    modal.className = 'modal fail-modal';
    title.className = 'fail';
    title.textContent = '⏰ 时间到！';
    sub.textContent = '本关得分';
    detail.textContent = `差 ${(levelGoal() - score).toLocaleString()} 分未达标，加油！`;
    nextBtn.style.display = 'none';
    retryBtn.style.display = '';
  }

  document.getElementById('overlay').classList.add('active');
}

function nextLevel() {
  document.getElementById('overlay').classList.remove('active');
  level++;
  score = 0;
  timeLeft = BASE_TIME;
  initBoard();
  render();
  startTimer();
}

function retryLevel() {
  document.getElementById('overlay').classList.remove('active');
  score = 0;
  timeLeft = BASE_TIME;
  initBoard();
  render();
  startTimer();
}

// ── Start ────────────────────────────────────────────────────
initBoard();
render();
startTimer();
</script>
